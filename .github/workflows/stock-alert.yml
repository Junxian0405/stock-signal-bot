name: 短线交易信号 Short-Term Signal Bot

on:
  schedule:
    # ─── 日内交易黄金时段 (EDT = UTC-4，每日 6 次) ───
    # 错峰到质数分钟避开 GitHub schedule drop（:00/:15/:30/:45 是全球 cron 高峰）
    # 实际偏移 ±3 分钟对短线决策毫无影响
    - cron: "33 12 * * 1-5"  # 08:33 ET — 经济数据高峰发布时段 (CPI/PPI/Jobs)
    - cron: "47 13 * * 1-5"  # 09:47 ET — 开盘后方向确认
    - cron: "29 14 * * 1-5"  # 10:29 ET — 开盘1小时后，首小时反转窗口
    - cron: "3 18 * * 1-5"   # 14:03 ET — 午后 / FOMC 利率声明时段
    - cron: "31 19 * * 1-5"  # 15:31 ET — Power Hour，决定是否过夜
    - cron: "17 20 * * 1-5"  # 16:17 ET — 收盘后，财报捕捉
  workflow_dispatch:

jobs:
  send-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run short-term analyzer
        env:
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          TAVILY_API_KEY:        ${{ secrets.TAVILY_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          GEMINI_API_KEYS:       ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_MODEL:          ${{ vars.GEMINI_MODEL          || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || 'gemini-3.1-flash-lite' }}
          GEMINI_REQUEST_DELAY:  '2.0'
          STOCK_LIST:            ${{ secrets.STOCK_LIST }}
        run: python src/analyzer.py
