name: Stock Signal Bot

on:
  schedule:
    # Dedicated pre-market deep scans (EDT = UTC-4)
    # - cron: "0 8 * * 1-5"    # 04:00 ET — early pre-market
    # - cron: "0 11 * * 1-5"   # 07:00 ET — mid pre-market
    # - cron: "0 13 * * 1-5"   # 09:00 ET — final pre-market (30 min before open)
    # Hourly market hours (09:30–16:00 ET)
    - cron: "30 13 * * 1-5"  # 09:30 ET — open bell
    - cron: "0 15 * * 1-5"   # 11:00 ET
    - cron: "0 16 * * 1-5"   # 12:00 ET
    - cron: "0 17 * * 1-5"   # 13:00 ET
    - cron: "0 18 * * 1-5"   # 14:00 ET
    - cron: "0 19 * * 1-5"   # 15:00 ET
    - cron: "0 20 * * 1-5"   # 16:00 ET — close bell
    # After-hours (16:00–20:00 ET)
    - cron: "0 21 * * 1-5"   # 17:00 ET
    - cron: "0 22 * * 1-5"   # 18:00 ET
    - cron: "0 23 * * 1-5"   # 19:00 ET
    - cron: "0 0 * * 2-6"    # 20:00 ET
  workflow_dispatch:

jobs:
  send-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← add this line
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analyzer
        env:
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python src/analyzer.py
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analyzer
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/analyzer.py
